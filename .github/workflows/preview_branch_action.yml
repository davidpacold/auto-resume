name: Generate PDFs and Deploy to Cloudflare Pages Preview Branch

on:
  push:
    branches-ignore:
      - main  # PDFs committed to branch are included when the PR is merged
  workflow_dispatch:

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Build Website
        run: hugo --minify

      - name: Wait for Cloudflare Pages Deployment
        run: |
          MAX_RETRIES=30
          RETRY_INTERVAL=10
          BRANCH_NAME="${{ github.ref_name }}"

          for i in $(seq 1 $MAX_RETRIES); do
            DEPLOYMENT_STATUS=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME/deployments")

            DEPLOY_STATE=$(echo $DEPLOYMENT_STATUS | jq -r --arg branch "$BRANCH_NAME" '[.result[] | select(.environment == "preview" and .deployment_trigger.metadata.branch == $branch)] | .[0].latest_stage.status')
            PREVIEW_URL=$(echo $DEPLOYMENT_STATUS | jq -r --arg branch "$BRANCH_NAME" '[.result[] | select(.environment == "preview" and .deployment_trigger.metadata.branch == $branch)] | .[0].url')

            echo "Attempt $i/$MAX_RETRIES: state=$DEPLOY_STATE, url=$PREVIEW_URL"

            if [[ "$DEPLOY_STATE" == "success" ]] && [[ -n "$PREVIEW_URL" && "$PREVIEW_URL" != "null" ]]; then
              echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
              echo "Deployment ready: $PREVIEW_URL"
              exit 0
            elif [[ "$DEPLOY_STATE" == "failure" ]]; then
              echo "Error: Cloudflare Pages deployment failed. Check the Cloudflare Pages dashboard for build logs."
              exit 1
            fi

            sleep $RETRY_INTERVAL
          done

          echo "Error: Deployment did not become ready within $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: "auto-resume"

      - name: Generate PDFs
        run: |
          echo "Using PREVIEW_URL: $PREVIEW_URL"
          export RESUME_URL="$PREVIEW_URL"
          echo "Using RESUME_URL: $RESUME_URL"
          python get_pdf.py
          mkdir -p ./static/pdf ./public/pdf
          cp static_pdf/*.pdf ./static/pdf/
          cp static_pdf/*.pdf ./public/pdf/

      - name: Commit Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add static
          git diff-index --quiet HEAD || (git commit -a -m "Updated PDFs" --allow-empty)

      - name: Push Changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
