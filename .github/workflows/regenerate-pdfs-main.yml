name: Re-generate PDFs on Main Branch

on:
  push:
    branches:
      - main  # Auto-trigger on merge to main
  workflow_dispatch:  # Allow manual trigger

jobs:
  regenerate-pdfs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Build Website
        run: hugo --minify

      - name: Generate PDFs
        env:
          RESUME_URL: "https://resume.davidpacold.dev"
        run: |
          echo "Re-generating PDFs for the main branch."
          echo "Using RESUME_URL: $RESUME_URL"
          python get_pdf.py
          mkdir -p ./static/pdf ./public/pdf
          cp static_pdf/*.pdf ./static/pdf/
          cp static_pdf/*.pdf ./public/pdf/

      - name: Commit Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add static
          git diff-index --quiet HEAD || (git commit -a -m "Re-generated PDFs on main branch" --allow-empty)

      - name: Push Changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
